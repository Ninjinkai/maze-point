name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Cache Godot editor
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/godot
          key: ${{ runner.os }}-godot-4.6.2

      - name: Install Godot 4.6.2
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -L "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip" -o /tmp/godot.zip
          unzip -j /tmp/godot.zip "Godot_v4.6.2-stable_linux.x86_64" -d "$HOME/.local/bin"
          mv "$HOME/.local/bin/Godot_v4.6.2-stable_linux.x86_64" "$HOME/.local/bin/godot"
          chmod +x "$HOME/.local/bin/godot"

      - name: Add Godot to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Warm project validation
        run: godot --headless --path . --quit
